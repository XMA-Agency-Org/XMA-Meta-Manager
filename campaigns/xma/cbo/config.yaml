      primaryTexts:
        - "I had a supplement brand. Spending $15,000 a month on ads. People were clicking \u2014 nobody was buying.\n\nThen I found XMA. They looked at everything. The ads, the pages, the whole setup. They rebuilt it. New ads, fixed the landing page \u2014 and they just ran it. I didn't have to touch anything.\n\nWithin the first month, cost per purchase dropped and sales started coming in consistently.\n\nIf you're running an online store and your ads aren't working \u2014 just book the call. They know their job."
        - "Your ads are getting clicks but zero sales. Sound familiar?\n\nOne of our clients was burning through $15K/month on Meta ads with nothing to show for it. We looked at everything \u2014 rebuilt the ads, fixed the funnel, and ran it all for them.\n\nResult? Cost per purchase dropped in month one. Consistent sales followed.\n\nStop guessing what's broken. Book a free strategy call with XMA and let us show you exactly what needs to change."
        - "What if the problem isn't your product \u2014 it's your ads?\n\nA supplement brand came to us spending $15K/month. Clicks were there. Sales weren't.\n\nWe rebuilt their ads. Fixed their landing page. Ran the whole thing end to end.\n\nFirst month: lower cost per purchase, real sales, consistently.\n\nYour store could be next. Book a call with XMA."
        - "We took a supplement brand from bleeding $15K/month in wasted ad spend to consistent, profitable sales \u2014 in 30 days.\n\nWe didn't just tweak their ads. We rebuilt the entire system: creatives, landing page, campaign structure. End to end. They didn't have to lift a finger.\n\nXMA handles everything so you can focus on growing your business.\n\nReady to fix your ads? Book a free call."
        - "\"I didn't have to touch anything. They just ran it. And within the first month, sales started coming in consistently.\"\n\nThat's what happens when you let XMA take over your ad account.\n\nWe don't just run ads. We audit your entire setup \u2014 creatives, landing pages, targeting \u2014 rebuild what's broken, and deliver results.\n\nOne client went from $15K/month wasted to profitable in 30 days.\n\nBook a free strategy call and see what we'd change for you."
