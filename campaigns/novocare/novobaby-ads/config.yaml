      file: "graphics/post-07-v1.png"
      primaryTexts:
        - "What makes NovoBaby different from everything else on the shelf?\n\nFDA-approved and made in the UAE. Dermatologist-tested and pediatrician-approved. Ultra-gentle formulas safe for newborns. Tear-free and hypoallergenic. Nourishing, soothing ingredients.\n\nNovoBaby isn't just another baby brand. It's the one you can actually trust.\n\nShop now."
