  # ── Post 18 — Full Product Line (Because Your Baby Deserves the Best) ──
  - ref: "post_18_full_line"
    name: "Post 18 - Full Line - Because Your Baby Deserves the Best"
    adSetRef: "full_product_line"
    status: "PAUSED"
    creative:
      pageId: "753083004565977"
      file: "graphics/post-18.png"
      primaryTexts:
        - "Your baby deserves more than generic. They deserve gentle, nourishing care from bath time to bedtime.\n\nNovoBaby is a complete baby care line — Baby Oil, Baby Lotion, Tear-Free Shampoo, Baby Cologne, Diaper Rash Cream — all FDA-approved and made right here in the UAE.\n\nBecause your baby deserves the best.\n\nShop NovoBaby today."
        - "From their very first bath to their last cuddle before bed — every moment matters.\n\nNovoBaby covers it all: Baby Lotion, Baby Oil, Tear-Free Shampoo, Baby Cologne, and Diaper Rash Cream. Dermatologist-tested. Pediatrician-approved. Made in the UAE.\n\nGentle, nourishing care for every moment.\n\nDiscover the full range now."
        - "One brand. Everything your baby needs.\n\nNovoBaby brings together Baby Lotion, Baby Oil, Tear-Free Shampoo, Baby Cologne, Diaper Rash Cream, and Baby Wipes — all in one trusted, FDA-approved line.\n\nNo more mixing brands. No more guessing what's safe.\n\nJust pure, gentle care from day one.\n\nShop the collection."
      headlines:
        - "Because Your Baby Deserves the Best"
        - "Gentle Care From Bath Time to Bedtime"
        - "The Complete Baby Care Line - Made in the UAE"
      callToAction: "SHOP_NOW"
      landingPageUrl: "https://novocare.me/collections/novobaby"
      urlTags: "utm_source=meta&utm_medium=paid&utm_campaign=novobaby_uae_launch&utm_content=post_18_full_line"

