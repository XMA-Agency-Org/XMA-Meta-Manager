        - "After bath time comes the best part — massage, moisturize, and a touch of freshness.\n\nNovoBaby Baby Oil soothes and nourishes with Aloe Vera and Vitamin E. NovoBaby Baby Cologne adds everyday freshness with a gentle, non-irritating formula.\n\nBoth designed for the most delicate skin.\n\nDiscover the duo."
        - "Massage time is bonding time.\n\nNovoBaby Baby Oil is made for those precious moments — Aloe Vera and Vitamin E to nourish, a lightweight formula that absorbs without leaving residue.\n\nFinish with NovoBaby Baby Cologne for a baby-safe, everyday-fresh scent.\n\nGentle care that brings you closer.\n\nShop NovoBaby."
