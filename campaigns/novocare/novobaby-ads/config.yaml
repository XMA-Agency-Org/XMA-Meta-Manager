      file: "graphics/post-14.png"
      primaryTexts:
        - "Eye-stinging shampoos. Bath time tears. Dry, sensitive skin. Diaper irritation worries. Confusing routines. No one brand that does it all.\n\nSound familiar?\n\nNovoBaby solves every one of these. Tear-Free Shampoo. Nourishing Baby Oil. Soothing Baby Lotion. Protective Diaper Rash Cream. Gentle Baby Wipes. Refreshing Baby Cologne.\n\nOne brand. Every problem handled.\n\nShop NovoBaby."
        - "You shouldn't need six different brands for six different problems.\n\nNovoBaby is the complete baby care line — Tear-Free Shampoo for bath time without tears, Baby Oil and Lotion for dry skin, Diaper Rash Cream for irritation, and Baby Wipes for gentle cleanup.\n\nAll FDA-approved. All dermatologist-tested. All in one place.\n\nDiscover the range."
        - "Every parent knows the struggle: finding baby products that are truly gentle, actually work, and don't require a chemistry degree to understand.\n\nNovoBaby makes it simple. Six products. One trusted line. Zero compromises.\n\nFrom bath time tears to diaper rash worries — we've got you covered.\n\nShop now."
      headlines:
