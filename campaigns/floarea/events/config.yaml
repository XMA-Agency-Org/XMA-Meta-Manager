    creative:
      pageId: "773383349196089"
      file: "Floarea events - General - Arabic .mp4"
      leadFormId: "26848766191430383"
      primaryTexts:
        - "POV: يوم تختار FLOAREA لمناسبتك 🌸\n\nفي FLOAREA، ما نبيع ورود فقط\nإحنا نصمّم تجارب\n\nمن الفكرة الأولى… للتصميم والتنسيق… لحين التنفيذ الكامل في موقع مناسبتك\n\nوثقوا فينا أكثر من ألف عميل في الإمارات\nعشان نحوّل رؤيتهم لواقع ينبض بالجمال\n\nقول لنا شو المناسبة… وخلك مرتاح، إحنا نهتم بالباقي ✨\nاضغط تحت وتواصل ويانا اليوم"
        - "لما يقولك الضيوف \"الله يكرّمك، كان الحفل مميز\" 🌸\n\nهذا اللي إحنا نشتغل عليه\n\nفي FLOAREA، كل تفصيلة في مناسبتك مدروسة:\n✅ تنسيقات ورد مخصّصة لكل مناسبة\n✅ من الفكرة للتصميم للتنفيذ الكامل\n✅ ثقة أكثر من ألف عميل في الإمارات\n\nمناسبتك تستحق أكثر من المعتاد\n\nقول لنا عن مناسبتك… إحنا نهتم بالباقي 💐\nاضغط تحت وتواصل ويانا اليوم"
        - "التنسيق المكرّر ما يليق بمناسبتك 🌸\n\nFLOAREA تصمّم كل مناسبة من الصفر\n\nمن الفكرة… للتصميم… للتنفيذ الكامل في موقعك\n\n✨ ورود فاخرة مخصّصة لطابع كل مناسبة\n✨ فريق متكامل يتولى كل التفاصيل\n✨ أكثر من ألف مناسبة ناجحة في الإمارات\n\nمناسبتك الجاية تستحق لمسة FLOAREA\n\nاضغط تحت وخبّرنا عن مناسبتك ✨"
        - "أكثر من ألف مناسبة في الإمارات وثقوا في FLOAREA 🌸\n\nسواء كانت:\n🌸 حفل خاص\n🏢 فعالية شركة\n💍 زفاف\n🎊 مناسبة موسمية\n\nإحنا نتكفّل بكل شي — من الفكرة الأولى لآخر وردة\n\nمناسبتك تستحق أن تُنفَّذ بأعلى مستوى\n\nاضغط تحت وخبّرنا شو المناسبة ✨"
        - "مناسبتك مو مجرد حدث — هي تجربة تُعاش 🌸\n\nFLOAREA تحوّل رؤيتك لواقع ينبض بالجمال\n\nتنسيقات ورد فاخرة مخصّصة لكل تفصيلة\nتصاميم تعكس شخصيتك وطابع مناسبتك\nتنفيذ متكامل من الفكرة لحظة الافتتاح\n\nهذا مو ديكور — هذا فن\n\nتواصل ويانا واحجز استشارتك المجانية اليوم 💐"
      headlines:
        - "خلك مرتاح، إحنا نهتم بالمناسبة 🌸"
        - "تنسيقات ورد مخصّصة لكل مناسبة"
        - "أكثر من ١٠٠٠ مناسبة في الإمارات"
        - "من الفكرة للتنفيذ — إحنا معك"
        - "مناسبتك تستحق لمسة FLOAREA ✨"
      callToAction: "GET_QUOTE"

  # ── B2B Arabic Video ──
  - ref: "events_b2b_ar"
    name: "Events B2B - Arabic Video - Lead Gen"
    adSetRef: "uae_arabic_events"
    status: "PAUSED"
    creative:
      pageId: "773383349196089"
      file: "Floarea events - B2B - Arabic.mp4"
      leadFormId: "26848766191430383"
      primaryTexts:
        - "إذا حدثك في دبي… لازم يكون بهالشكل 👀\n\nفعاليات تبني اسمك\nتجارب ترفع مستوى شركتك\nلحظات خاصة تُنصنع بذوق\nتصاميم موسمية تخطف الأنظار\n\nكل تفصيلة… بلمسة FLOAREA\nونتيجة؟ انطباع ما يُنسى ✨\n\nاحجز موعدك اليوم…\nمو بس تنظيم حدث… إحنا نصنع تجربة تنحفر في الذاكرة"
        - "شركتك تستحق فعاليات بمستوى علامتها التجارية 👀\n\nFLOAREA تخلق بيئات تعكس احترافيتك وتميّزك\n\n🏢 إطلاق منتجات يُتحدّث عنه\n🤝 مؤتمرات تترك انطباع لا يُنسى\n🌸 تجارب بصرية تحكي قصة شركتك\n🎯 تصاميم موسمية تعكس هوية علامتك\n\nكل فعالية… فرصة تبني فيها اسمك\n\nاحجز موعدك اليوم وخلّينا نرتقي بفعالياتك ✨"
        - "فعاليتك بتحكي عن مستوى شركتك 👀\n\nلما التنسيق عادي… الانطباع عادي\nلما التنسيق استثنائي… شركتك تبقى في الذاكرة\n\nFLOAREA تضمن إن كل تفصيلة في فعاليتك:\n✅ تعكس احترافية علامتك التجارية\n✅ تخلق بيئة تلهم وتؤثر\n✅ تُنفَّذ بأعلى معايير الجودة\n\nشركات رائدة في الإمارات وثقت فينا\nدورك الحين ✨\n\nاحجز موعدك وابدأ التخطيط اليوم"
        - "النتيجة؟ ضيوفك ما يوقفون عن التصوير 👀\n\nهذا ما تصنعه FLOAREA لفعاليات الشركات\n\n✅ تصاميم مخصّصة تعكس هوية علامتك\n✅ إعداد وتنفيذ متكامل في الموقع\n✅ تجربة بصرية تولّد محتوى لوحدها\n\nمن حفلات إطلاق المنتجات\nلمؤتمرات الشركات والتجمعات الخاصة\n\nخلّي فعالياتك الجاية تنحفر في ذاكرة من حضر\n\nاحجز موعدك اليوم 🌸"
        - "كل شركة تقدر تنظّم فعالية\nبس مو كل شركة تقدر تخلق تجربة 👀\n\nهذا الفرق بين FLOAREA وغيرها\n\nفعاليات تبني اسمك في السوق\nتصاميم تخطف الأنظار وتنعكس على صورة شركتك\nلحظات يتحدث عنها الحضور بعد ما ينتهي اليوم\n\nإذا علامتك التجارية تستحق الأفضل…\nفعالياتك تستحق FLOAREA ✨\n\nاحجز موعدك اليوم وخلّينا نصنع معك شيء استثنائي"
      headlines:
        - "فعاليات تنحفر في الذاكرة 👀"
        - "ارتقِ بفعاليات شركتك مع FLOAREA"
        - "إذا كان في دبي… لازم يكون استثنائي"
        - "احجز موعدك — إحنا نصنع التجربة"
        - "فعاليات بمستوى علامتك التجارية ✨"
      callToAction: "GET_QUOTE"
