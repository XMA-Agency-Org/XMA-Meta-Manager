      primaryTexts:
        - "هي صنعت كل ما أنت عليه اليوم. هذه فرصتك لتُريها أنك تتذكّر. 🤍\n\nدليل هدايا عيد الأم من فلوريا هنا — تصفّح باقات الورود الطازجة المصنوعة يدوياً واجمعها مع مجوهرات فاخرة وبالونات لمفاجأة مثالية.\n\nإيجاد هديتها أصبح سهلاً.\n\n🌸 اطلب مسبقاً الآن واحصل على خصم 15% ⏳ ينتهي العرض في 21 مارس 🚗 توصيل مجاني للطلبات فوق 400 درهم\n\n👇 تصفّح خيارات الهدايا اليوم."
        - "في عيد الأم، أعطها أكثر من ورود. أعطها تجربة كاملة. 🌸\n\nمجموعة عيد الأم المختارة من فلوريا تقدّم:\n\n💐 باقات ورود طازجة فاخرة مصنوعة يدوياً 💎 مجوهرات فاخرة 🎈 بالونات\n\nاختر باقتها. أضف لمسة نهائية. وصّل الهدية المثالية.\n\n✨ اطلب مسبقاً اليوم — خصم 15% حتى 21 مارس 🚗 توصيل مجاني للطلبات فوق 400 درهم\n\n👇 استكشف جميع خيارات الهدايا الآن."
        - "سهّلناها عليك. 💭\n\nمجموعة عيد الأم من فلوريا تضم مجموعة من باقات الورود الطازجة الفاخرة — كل واحدة جاهزة للجمع مع مجوهرات فاخرة وبالونات لهدية ستحبها.\n\nاختر باقتها. أضف إضافتها المفضلة. انتهى.\n\n🌸 اطلب مسبقاً الآن ← خصم 15% حتى 21 مارس 🚗 توصيل مجاني للطلبات فوق 400 درهم\n\nلا مزيد من التخمين. فقط إهداء.\n\n👇 شاهد جميع أفكار الهدايا."
        - "هدية عيد الأم المثالية لا يجب أن تكون صعبة الإيجاد. 🤍\n\nمجموعة فلوريا تضم باقات ورود طازجة مذهلة يمكنك جمعها مع:\n\n💎 مجوهرات فاخرة 🎈 بالونات\n\nهدية واحدة. مجمّعة بأناقة. موصّلة لباب بيتها.\n\n🎁 اطلب مسبقاً قبل 21 مارس واحصل على خصم 15% 🚗 توصيل مجاني للطلبات فوق 400 درهم\n\n👇 اختر هديتها الآن."
        - "هي لم تطلب شيئاً أبداً. اجعل عيد الأم هذا هو الذي تتجاوز فيه التوقعات. 🌸\n\nمجموعة عيد الأم من فلوريا تجمع باقات الورود الطازجة الفاخرة والمجوهرات الفاخرة والبالونات — كل ما تحتاجه لتصنع هدية مميزة كما هي.\n\nبدون بحث. بدون توتر. فقط مفاجأة واحدة مختارة بعناية.\n\n✨ اطلب مسبقاً الآن واحصل على خصم 15% — ينتهي 21 مارس 🚗 توصيل مجاني للطلبات فوق 400 درهم\n\n👇 استكشف جميع أفكار هدايا عيد الأم."
      headlines:
        - "هدايا عيد الأم للمرأة التي صنعتك"
        - "باقات فاخرة. مجوهرات. بالونات. كلها في هدية واحدة."
        - "لا تعرف ماذا تُهديها في عيد الأم؟"
        - "اطلب هديتها مسبقاً — خصم 15%"
        - "أفكار هدايا لأهم امرأة في حياتك"
      callToAction: "SHOP_NOW"
      landingPageUrl: "https://floarea.ae/collections/mothers-day"
      urlTags: "utm_source=meta&utm_medium=paid&utm_campaign=mothers_day_2026&utm_content=v3_bundle_ar"

