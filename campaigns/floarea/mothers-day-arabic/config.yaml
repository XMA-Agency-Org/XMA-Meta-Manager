  # ── Video 8 — General Promo (Arabic) ──
  - ref: "v8_general_ar"
    name: "V8 General - Promo Ordering Online (Arabic)"
    adSetRef: "broad_uae_arabic"
    status: "PAUSED"
    creative:
      pageId: "773383349196089"
      file: "Floarea Video 8 Arabic.mp4"
      primaryTexts:
        - "🌹 لا تزال تبحث عن هدية عيد الأم المثالية؟\n\nاكتشف مجموعة عيد الأم الفاخرة من فلوريا — باقات أنيقة مصنوعة يدوياً وورود أبدية صُمّمت لتبهر حقاً.\n\nاطلب مسبقاً اليوم واستمتع بخصم 15% لفترة محدودة ✨ ⏳ ينتهي العرض في 21 مارس\n\n✅ توصيل خلال ساعة واحدة في أي مكان في دبي ✅ توصيل مجاني للطلبات فوق 400 درهم\n\nالطلب يستغرق دقائق. إسعادها يدوم للأبد.\n\n👇 اضغط أدناه واختر هديتها المثالية الآن."
        - "💐 مجموعة عيد الأم من فلوريا متاحة الآن.\n\nباقات فاخرة. ورود أبدية. تنسيقات مصنوعة يدوياً تتحدث بصوت أعلى من الكلمات.\n\n🎁 اطلب مسبقاً قبل 21 مارس واحصل على خصم حصري 15%.\n\n🚗 توصيل في أي مكان في دبي — خلال ساعة واحدة 🌹 توصيل مجاني للطلبات فوق 400 درهم\n\nهي أعطتك كل شيء. أعطها شيئاً يدوم للأبد.\n\n👇 تسوّق المجموعة الآن."
        - "ماذا تُهدي المرأة التي أعطتك كل شيء؟ 💭\n\nليس مجرد ورود — بل أزهار فاخرة تدوم للأبد.\n\nمجموعة عيد الأم من فلوريا تضم باقات مصنوعة يدوياً وورود أبدية صُمّمت لتترك انطباعاً لا يُنسى.\n\n🌹 اطلب مسبقاً الآن ← خصم 15% حتى 21 مارس 🚗 توصيل خلال ساعة في أي مكان في دبي ✅ توصيل مجاني للطلبات فوق 400 درهم\n\nهذه أكثر من هدية. هذه طريقتك لتقول شكراً.\n\n👇 اختر باقتها المثالية اليوم."
        - "في عيد الأم، هي تستحق أكثر من المعتاد 🌸\n\nاستكشف مجموعة فلوريا المختارة من الباقات المصنوعة يدوياً والورود الأبدية — مصمّمة للنساء اللواتي يقدّرن الأناقة.\n\n✨ اطلب مسبقاً قبل 21 مارس واستمتع بخصم 15%\n\n🚗 توصيل خلال ساعة في جميع أنحاء دبي 🎁 توصيل مجاني للطلبات فوق 400 درهم\n\nلا تدع اللحظة تفوتك. أفضل الهدايا تُختار بعناية.\n\n👇 تصفّح المجموعة وفاجئها."
        - "حبها لم يأتِ بشروط. هديتك لا ينبغي أن تأتي بتنازلات. 💛\n\nمجموعة عيد الأم من فلوريا:\n\n🌹 باقات فاخرة مصنوعة يدوياً 🌹 ورود أبدية تدوم لسنوات 🚗 توصيل خلال ساعة في أي مكان في دبي 🎁 توصيل مجاني للطلبات فوق 400 درهم ✨ خصم 15% عند الطلب المسبق قبل 21 مارس\n\nيستغرق الطلب دقائق. لكنها لن تنساه أبداً.\n\n👇 اضغط أدناه لتجد هديتها المثالية."
      headlines:
        - "اجعل عيد الأم هذا لا يُنسى"
        - "اطلب مسبقاً هديتها — وفّر 15%"
        - "الهدية التي لن تنساها أبداً"
        - "أزهار فاخرة تدوم للأبد"
        - "ورود عيد الأم — توصيل لباب بيتها خلال ساعة"
      callToAction: "SHOP_NOW"
      landingPageUrl: "https://floarea.ae/collections/mothers-day"
      urlTags: "utm_source=meta&utm_medium=paid&utm_campaign=mothers_day_2026&utm_content=v8_general_ar"

  # ── Video 3 — Fresh Flowers Gift Guide (Arabic) ──
  - ref: "v3_bundle_ar"
    name: "V3 Bundle - Fresh Flowers Gift Guide (Arabic)"
