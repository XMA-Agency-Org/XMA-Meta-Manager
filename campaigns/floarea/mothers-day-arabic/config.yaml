        - "قضت حياتها كلها وأنتَ أولويتها. في عيد الأم، جاء دورك. 🤍\n\nفاجئها بباقات فلوريا الفاخرة المصنوعة يدوياً مع مجوهرات بيورو الفاخرة — نوع الهدية الذي يتركها بلا كلام.\n\nردة فعلها ستقول لك كل شيء.\n\n🌸 اطلب مسبقاً الآن واحصل على خصم 15% ⏳ ينتهي العرض في 21 مارس 🚗 توصيل مجاني للطلبات فوق 400 درهم\n\n👇 خطّط لمفاجأتها اليوم."
        - "الورود وحدها لفتة جميلة. الورود مع مجوهرات فاخرة؟ هذا لا يُنسى. 💎\n\nفي عيد الأم، تجاوز المتوقع. اجمع باقات فلوريا الفاخرة المصنوعة يدوياً مع مجوهرات بيورو الفاخرة وامنحها لحظة ستتحدث عنها لسنوات.\n\nلن تتوقعها. لكنها لن تنساها أبداً.\n\n🌸 اطلب مسبقاً الآن ← خصم 15% حتى 21 مارس 🚗 توصيل مجاني للطلبات فوق 400 درهم\n\n👇 صمّم هديتها المثالية الآن."
        - "ليس رسالة نصية. ليس حجز عشاء. مفاجأة حقيقية. من النوع الذي يجعلها تبكي من الفرح. 💭\n\nمجموعة عيد الأم من فلوريا مع مجوهرات بيورو الفاخرة — باقات فاخرة ومجوهرات أنيقة معاً في هدية واحدة لا تُنسى.\n\nلن تتوقعها. لكنها لن تتوقف عن الابتسام.\n\n🌸 اطلب مسبقاً الآن واحصل على خصم 15% ⏳ ينتهي العرض في 21 مارس 🚗 توصيل مجاني للطلبات فوق 400 درهم\n\n👇 ابدأ بالتخطيط لمفاجأتها."
        - "اجعل عيد الأم هذا هو الذي تتذكره للأبد. 🤍\n\nاجمع باقات فلوريا الفاخرة المصنوعة يدوياً مع مجوهرات بيورو الفاخرة لهدية تتجاوز الورود.\n\nمفاجأة واحدة. هديتان. ردة فعل لن تنساها أنت أيضاً.\n\n🎁 اطلب مسبقاً قبل 21 مارس واحصل على خصم 15% 🚗 توصيل مجاني للطلبات فوق 400 درهم\n\n👇 اختر هديتها اليوم."
        - "جهّز المكان. أغلق الستار. أحضرها. وشاهد وجهها عندما تراه. 🌹\n\nباقات فلوريا الفاخرة المصنوعة يدوياً مع مجوهرات بيورو الفاخرة — نوع مفاجأة عيد الأم التي ستتحدث عنها طويلاً بعد انتهاء اليوم.\n\nلن تتوقعها. لكنها لن تنساها أبداً.\n\n✨ اطلب مسبقاً الآن واحصل على خصم 15% — ينتهي 21 مارس 🚗 توصيل مجاني للطلبات فوق 400 درهم\n\n👇 خطّط لمفاجأة عيد الأم."
      headlines:
        - "لن تتوقعها. لكنها لن تنساها أبداً."
        - "أفضل هدايا عيد الأم هي التي لا تراها قادمة."
        - "متى كانت آخر مرة فاجأتها حقاً؟"
        - "باقات فاخرة + مجوهرات — هدية عيد أم لا تُنسى."
        - "أعطتك كل شيء. امنحها لحظة لن تنساها."
