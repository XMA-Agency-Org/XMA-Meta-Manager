  # ── Video 6 — Forever Rose + Jewellery Combo (Arabic) ──
  - ref: "v6_forever_rose_ar"
    name: "V6 Forever Rose - Jewellery Combo (Arabic)"
    adSetRef: "broad_uae_arabic"
    status: "PAUSED"
    creative:
      pageId: "773383349196089"
      file: "Floarea Video 6 Arabic.mp4"
      primaryTexts:
        - "بعض الهدايا تذبل. هذه لا. 🤍\n\nورود فلوريا الأبدية — محفوظة لتدوم سنوات ومقترنة بمجوهرات بيورو الفاخرة لهدية عيد أم تليق بالحب الذي وراءها.\n\nأربعة خيارات مذهلة. كل واحد تحفة. كل واحد لا يُنسى.\n\n🌹 اطلب مسبقاً الآن واحصل على خصم 15% ⏳ ينتهي العرض في 21 مارس 🚗 توصيل مجاني للطلبات فوق 400 درهم\n\n👇 اختر وردتها الأبدية اليوم."
        - "حبها لم يكن له تاريخ انتهاء. هديتها لا ينبغي أن يكون لها أيضاً. 🌹\n\nفي عيد الأم، اجمع ورود فلوريا الأبدية الفاخرة مع مجوهرات بيورو الفاخرة — هدية ستعجب بها اليوم وغداً ولسنوات قادمة.\n\nليست مجرد لفتة. بل تذكار.\n\n✨ اطلب مسبقاً اليوم — خصم 15% حتى 21 مارس 🚗 توصيل مجاني للطلبات فوق 400 درهم\n\n👇 اختر التوليفة المثالية لها الآن."
        - "ماذا لو لم تذبل بعد أسبوع؟ ماذا لو استطاعت الاحتفاظ بها معروضة لسنوات؟ 💭\n\nورود فلوريا الأبدية محفوظة في قمة تفتّحها ومقترنة بمجوهرات بيورو الفاخرة — هديتان خالدتان في واحدة.\n\nلحظة عيد أم تبقى معها طويلاً بعد انتهاء اليوم.\n\n🌹 اطلب مسبقاً الآن ← خصم 15% حتى 21 مارس 🚗 توصيل مجاني للطلبات فوق 400 درهم\n\n👇 اختر وردتها الأبدية اليوم."
        - "التوليفة المثالية لعيد الأم. 🤍\n\nورود فلوريا الأبدية الفاخرة — محفوظة لتبقى جميلة لسنوات — مقترنة بمجوهرات بيورو الفاخرة.\n\nأربعة خيارات. كل واحد أنيق. كل واحد مصمّم لتبتسم لحظة تفتحه.\n\n🎁 اطلب مسبقاً قبل 21 مارس واحصل على خصم 15% 🚗 توصيل مجاني للطلبات فوق 400 درهم\n\n👇 اختر وردتها الأبدية اليوم."
        - "تتذكر كل ما فعلته من أجلك. الآن أعطها شيئاً ستتذكره للأبد. 🌹\n\nورود فلوريا الأبدية الفاخرة مقترنة بمجوهرات بيورو الفاخرة — محفوظة في قمة تفتّحها ومقدّمة بأناقة ومصنوعة لتدوم سنوات.\n\nنوع هدية عيد الأم التي لن تخبئها أبداً.\n\n✨ اطلب مسبقاً الآن واحصل على خصم 15% — ينتهي 21 مارس 🚗 توصيل مجاني للطلبات فوق 400 درهم\n\nتمسّكت بكل شيء من أجلك. أعطها شيئاً يستحق التمسّك به.\n\n👇 استكشف المجموعة."
      headlines:
        - "هدايا أبدية للمرأة التي تستحق الخلود."
        - "وردة أبدية مع مجوهرات فاخرة. هكذا تقول شكراً."
        - "ماذا لو دامت هديتها في عيد الأم للأبد؟"
        - "ورود أبدية + مجوهرات فاخرة — اطلب مسبقاً بخصم 15%"
        - "هدية ستحتفظ بها للأبد. لأنها تستحق ذلك."
      callToAction: "SHOP_NOW"
      landingPageUrl: "https://floarea.ae/collections/mothers-day"
      urlTags: "utm_source=meta&utm_medium=paid&utm_campaign=mothers_day_2026&utm_content=v6_forever_rose_ar"

